<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluador de Polla - Fecha 3</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 20px;
            color: #1e293b;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: #0f172a;
            margin-bottom: 5px;
        }
        .header-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-top: 20px;
            margin-bottom: 25px;
        }
        .card {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 15px;
            border-radius: 8px;
        }
        .card h3 { margin-top: 0; color: #334155; border-bottom: 2px solid #cbd5e1; padding-bottom: 5px; }
        .flex-input { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        .flex-input input { padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 0.95rem; }
        
        .score-box { background: linear-gradient(135deg, #0f172a, #1e293b); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 8px; text-align: center; }
        .score-box span { font-size: 2.5rem; font-weight: bold; color: #fde047; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.9rem;
        }
        th {
            background-color: #1e293b;
            color: white;
            padding: 12px 8px;
        }
        td {
            padding: 10px 8px;
            border-bottom: 1px solid #e2e8f0;
            text-align: center;
        }
        tr:hover { background-color: #f8fafc; }
        
        .btn-toggle {
            border: 1px solid #cbd5e1;
            background-color: white;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }
        .btn-toggle.active {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }
        .input-marcador {
            width: 40px;
            text-align: center;
            padding: 4px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-weight: bold;
        }
        .input-real {
            background-color: #fef08a;
            border: 1px solid #eab308;
        }
        .badge-puntos {
            background-color: #dcfce7;
            color: #166534;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: bold;
        }
        .vs { font-size: 0.8rem; font-weight: bold; color: #64748b; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Sistema Calificador de Pronósticos - Fecha 3</h1>
    
    <div class="header-grid">
        <div class="card">
            <h3>👤 Datos del Participante</h3>
            <div class="flex-input">
                <label style="font-weight: bold; width: 150px;">Nombre Completo:</label>
                <input type="text" id="nombre-participante" placeholder="Ej. Joel Andrade" style="flex: 1;">
            </div>
            <p style="margin: 5px 0 0 0; font-size: 0.85rem; color: #64748b;">
                💡 <b>Regla:</b> 1 Pnt por acertar resultado general (L/E/V) + 1 Pnt por acertar marcador exacto.
            </p>
        </div>

        <div class="score-box">
            Total Calificación
            <span id="score-total">0 / 48 Pts</span>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>N°</th>
                <th>Grupo</th>
                <th>Partido</th>
                <th>Resultado Real del Partido</th>
                <th>Pronóstico de la Persona</th>
                <th>Marcador de la Persona</th>
                <th>Puntos</th>
            </tr>
        </thead>
        <tbody id="tabla-evaluacion">
            </tbody>
    </table>
</div>

<script>
    // Estructura oficial de partidos de la Fecha 3 (con los dos primeros ya ingresados por defecto)
    const partidos = [
        { n: 49, grupo: "Grupo B", eq1: "Suiza", eq2: "Canadá", r1: 2, r2: 1 },
        { n: 50, grupo: "Grupo B", eq1: "Bosnia y Herzeg", eq2: "Qatar", r1: 3, r2: 1 },
        { n: 51, grupo: "Grupo C", eq1: "Marruecos", eq2: "Haití", r1: "", r2: "" },
        { n: 52, grupo: "Grupo C", eq1: "Escocia", eq2: "Brasil", r1: "", r2: "" },
        { n: 53, grupo: "Grupo A", eq1: "México", eq2: "Rep. Checa", r1: "", r2: "" },
        { n: 54, grupo: "Grupo A", eq1: "Sudáfrica", eq2: "Corea del Sur", r1: "", r2: "" },
        { n: 55, grupo: "Grupo F", eq1: "Japón", eq2: "Suecia", r1: "", r2: "" },
        { n: 56, grupo: "Grupo F", eq1: "Túnez", eq2: "Países Bajos", r1: "", r2: "" },
        { n: 57, grupo: "Grupo E", eq1: "ECUADOR", eq2: "Alemania", r1: "", r2: "" },
        { n: 58, grupo: "Grupo E", eq1: "Curazao", eq2: "Costa de Marfil", r1: "", r2: "" },
        { n: 59, grupo: "Grupo D", eq1: "Estados Unidos", eq2: "Turquía", r1: "", r2: "" },
        { n: 60, grupo: "Grupo D", eq1: "Paraguay", eq2: "Australia", r1: "", r2: "" },
        { n: 61, grupo: "Grupo I", eq1: "Noruega", eq2: "Francia", r1: "", r2: "" },
        { n: 62, grupo: "Grupo I", eq1: "Senegal", eq2: "Irak", r1: "", r2: "" },
        { n: 63, grupo: "Grupo H", eq1: "Uruguay", eq2: "España", r1: "", r2: "" },
        { n: 64, grupo: "Grupo H", eq1: "Cabo Verde", eq2: "Arabia Saudita", r1: "", r2: "" },
        { n: 65, grupo: "Grupo G", eq1: "Nueva Zelanda", eq2: "Bélgica", r1: "", r2: "" },
        { n: 66, grupo: "Grupo G", eq1: "Egipto", eq2: "Irán", r1: "", r2: "" },
        { n: 67, grupo: "Grupo J", eq1: "Argelia", eq2: "Austria", r1: "", r2: "" },
        { n: 68, grupo: "Grupo J", eq1: "Jordania", eq2: "Argentina", r1: "", r2: "" },
        { n: 69, grupo: "Grupo L", eq1: "Panamá", eq2: "Inglaterra", r1: "", r2: "" },
        { n: 70, grupo: "Grupo L", eq1: "Croacia", eq2: "Ghana", r1: "", r2: "" },
        { n: 71, grupo: "Grupo K", eq1: "Colombia", eq2: "Portugal", r1: "", r2: "" },
        { n: 72, grupo: "Grupo K", eq1: "RD Congo", eq2: "Uzbekistán", r1: "", r2: "" }
    ];

    const registroEvaluacion = {};

    function construirTabla() {
        const tbody = document.getElementById('tabla-evaluacion');
        
        partidos.forEach(p => {
            registroEvaluacion[p.n] = { real1: p.r1, real2: p.r2, pPronostico: null, pM1: "", pM2: "" };
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><b>${p.n}</b></td>
                <td style="color:#64748b;">${p.grupo}</td>
                <td style="text-align:left;">
                    <span style="display:inline-block; width:100px; text-align:right;">${p.eq1}</span>
                    <span class="vs">vs</span>
                    <span style="display:inline-block; width:100px; text-align:left;">${p.eq2}</span>
                </td>
                <td>
                    <input type="number" min="0" class="input-marcador input-real" value="${p.r1}" oninput="cambioReal(${p.n}, 1, this.value)">
                    -
                    <input type="number" min="0" class="input-marcador input-real" value="${p.r2}" oninput="cambioReal(${p.n}, 2, this.value)">
                </td>
                <td>
                    <button class="btn-toggle" onclick="cambioPronostico(this, ${p.n}, 'L')">L</button>
                    <button class="btn-toggle" onclick="cambioPronostico(this, ${p.n}, 'E')">E</button>
                    <button class="btn-toggle" onclick="cambioPronostico(this, ${p.n}, 'V')">V</button>
                </td>
                <td>
                    <input type="number" min="0" class="input-marcador" placeholder="0" oninput="cambioMarcador(${p.n}, 1, this.value)">
                    -
                    <input type="number" min="0" class="input-marcador" placeholder="0" oninput="cambioMarcador(${p.n}, 2, this.value)">
                </td>
                <td><span class="badge-puntos" id="puntos-${p.n}">0</span></td>
            `;
            tbody.appendChild(tr);
            calcularPuntos(p.n);
        });
    }

    function cambioReal(id, eq, valor) {
        if(eq === 1) registroEvaluacion[id].real1 = valor !== "" ? parseInt(valor) : "";
        if(eq === 2) registroEvaluacion[id].real2 = valor !== "" ? parseInt(valor) : "";
        calcularPuntos(id);
    }

    function cambioPronostico(btn, id, opcion) {
        const hermanos = btn.parentNode.children;
        for(let h of hermanos) h.classList.remove('active');
        btn.classList.add('active');
        
        registroEvaluacion[id].pPronostico = opcion;
        calcularPuntos(id);
    }

    function cambioMarcador(id, eq, valor) {
        if(eq === 1) registroEvaluacion[id].pM1 = valor !== "" ? parseInt(valor) : "";
        if(eq === 2) registroEvaluacion[id].pM2 = valor !== "" ? parseInt(valor) : "";
        calcularPuntos(id);
    }

    function calcularPuntos(id) {
        const item = registroEvaluacion[id];
        let puntosPartida = 0;

        if (item.real1 !== "" && item.real2 !== "") {
            // Determinar signo real
            let signoReal = 'E';
            if (item.real1 > item.real2) signoReal = 'L';
            if (item.real1 < item.real2) signoReal = 'V';

            // 1. Validar Acierto de Tendencia (L/E/V)
            if (item.pPronostico === signoReal) {
                puntosPartida += 1;
            }

            // 2. Validar Acierto de Marcador Exacto
            if (item.pM1 !== "" && item.pM2 !== "") {
                if (item.pM1 === item.real1 && item.pM2 === item.real2) {
                    puntosPartida += 1;
                }
            }
        }

        document.getElementById(`puntos-${id}`).innerText = puntosPartida;
        recalcularGranTotal();
    }

    function recalcularGranTotal() {
        let granTotal = 0;
        partidos.forEach(p => {
            granTotal += parseInt(document.getElementById(`puntos-${p.n}`).innerText) || 0;
        });
        document.getElementById('score-total').innerText = `${granTotal} / 48 Pts`;
    }

    window.onload = construirTabla;
</script>

</body>
</html>
